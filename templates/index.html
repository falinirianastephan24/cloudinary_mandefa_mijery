<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloudinary Upload Pro</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        form {
            margin-bottom: 20px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        #progress {
            width: 100%;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        #bar {
            height: 20px;
            width: 0%;
            background: #22c55e;
        }

        #percentText {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🚀 Upload Images / Files</h1>

    <form id="uploadForm">
        <input type="file" id="fileInput" multiple required>
        <br>
        <button type="submit">Upload</button>
    </form>

    <div id="progress">
        <div id="bar"></div>
    </div>
    <span id="percentText">0%</span>

    <script>
    document.addEventListener("DOMContentLoaded", function() {

        const form = document.getElementById("uploadForm");
        const fileInput = document.getElementById("fileInput");
        const progress = document.getElementById("progress");
        const bar = document.getElementById("bar");
        const text = document.getElementById("percentText");

        if (!form) return;

        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const files = fileInput.files;

            if (!files.length) {
                alert("Misafidiana fichier aloha");
                return;
            }

            progress.style.display = "block";

            let uploaded = 0;
            let totalSize = 0;

            for (let f of files) totalSize += f.size;

            for (let file of files) {

                // LIMIT 50MB
                if (file.size > 50 * 1024 * 1024) {
                    alert(file.name + " lehibe loatra (max 50MB)");
                    continue;
                }

                let formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", "unsigned_upload");

                let xhr = new XMLHttpRequest();

                xhr.open("POST", "https://api.cloudinary.com/v1_1/dr0hbtyqz/auto/upload", true);

                // PROGRESS
                xhr.upload.onprogress = function(e) {
                    if (e.lengthComputable) {
                        let percent = Math.round(((uploaded + e.loaded) / totalSize) * 100);
                        bar.style.width = percent + "%";
                        text.innerText = percent + "%";
                    }
                };

                xhr.onload = async function() {
                    if (xhr.status !== 200) {
                        alert("Erreur upload Cloudinary");
                        return;
                    }

                    let data = JSON.parse(xhr.responseText);

                    // mandefa any backend
                    await fetch("/save", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            nom: file.name,
                            url: data.secure_url,
                            type: data.resource_type
                        })
                    });

                    uploaded += file.size;

                    if (uploaded >= totalSize) {
                        setTimeout(() => {
                            alert("Upload vita 🎉");
                            location.reload();
                        }, 500);
                    }
                };

                xhr.onerror = function() {
                    alert("Erreur réseau");
                };

                xhr.send(formData);
            }
        });
    });
    </script>

</body>
</html>
