<!DOCTYPE html>
<html>
<head>
    <title>Cloudinary Upload</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 10px;
            margin: 10px;
        }

        img, video {
            max-width: 200px;
        }

        #progress {
            width: 100%;
            background: #1e293b;
            display: none;
        }

        #bar {
            height: 20px;
            width: 0%;
            background: green;
        }
    </style>
</head>

<body>

<h1>🚀 Upload (MAX 100MB)</h1>

<form id="uploadForm">
    <input type="file" id="fileInput" multiple required>
    <button type="submit">Upload</button>
</form>

<div id="progress">
    <div id="bar"></div>
</div>
<p id="percentText">0%</p>

<hr>

<h2>📁 Files</h2>

<div>
    {% for m in medias %}
        <div class="card">
            <p>{{ m[1] }}</p>

            {% if m[3] and "image" in m[3] %}
                <img src="{{ m[2] }}">
            {% elif m[3] and "video" in m[3] %}
                <video src="{{ m[2] }}" controls></video>
            {% else %}
                <a href="{{ m[2] }}" target="_blank">Download</a>
            {% endif %}

            <br><br>
            <button onclick="deleteFile({{ m[0] }})">Delete</button>
        </div>
    {% endfor %}
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const files = document.getElementById("fileInput").files;
    let progress = document.getElementById("progress");
    let bar = document.getElementById("bar");
    let text = document.getElementById("percentText");

    if (!files.length) return;

    progress.style.display = "block";

    let uploaded = 0;
    let totalSize = 0;

    for (let f of files) totalSize += f.size;

    for (let file of files) {

        if (file.size > 100 * 1024 * 1024) {
            alert(file.name + " lehibe loatra (max 100MB)");
            continue;
        }

        let formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "unsigned_upload");

        let xhr = new XMLHttpRequest();

        xhr.open("POST", "https://api.cloudinary.com/v1_1/dr0hbtyqz/auto/upload");

        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                let percent = Math.round(((uploaded + e.loaded) / totalSize) * 100);
                bar.style.width = percent + "%";
                text.innerText = percent + "%";
            }
        };

        xhr.onload = async function() {
            if (xhr.status !== 200) {
                alert("Erreur upload");
                return;
            }

            let data = JSON.parse(xhr.responseText);

            await fetch("/save", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    nom: file.name,
                    url: data.secure_url,
                    type: data.resource_type
                })
            });

            uploaded += file.size;

            if (uploaded >= totalSize) {
                setTimeout(() => location.reload(), 500);
            }
        };

        xhr.onerror = function() {
            alert("Erreur réseau");
        };

        xhr.send(formData);
    }
});

function deleteFile(id) {
    fetch("/delete/" + id)
        .then(() => location.reload());
}
</script>

</body>
</html>
