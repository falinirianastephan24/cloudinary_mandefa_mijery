<script>
// 🚀 UPLOAD PRO LEVEL (REAL PROGRESS)
document.getElementById("uploadForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const files = document.getElementById("fileInput").files;
    let progress = document.getElementById("progress");
    let bar = document.getElementById("bar");
    let text = document.getElementById("percentText");

    progress.style.display = "block";

    let uploaded = 0;
    let totalSize = 0;

    // total size rehetra
    for (let f of files) {
        totalSize += f.size;
    }

    for (let file of files) {

        // limit 50MB
        if (file.size > 50 * 1024 * 1024) {
            alert("File lehibe loatra (max 50MB)");
            continue;
        }

        let formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "unsigned_upload");

        let xhr = new XMLHttpRequest();

        xhr.open("POST", "https://api.cloudinary.com/v1_1/dr0hbtyqz/auto/upload", true);

        // 🎯 PROGRESS REAL
        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                let percent = Math.round(((uploaded + e.loaded) / totalSize) * 100);
                bar.style.width = percent + "%";
                text.innerText = percent + "%";
            }
        };

        xhr.onload = async function() {
            let data = JSON.parse(xhr.responseText);

            // save any backend
            await fetch("/save", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    nom: file.name,
                    url: data.secure_url,
                    type: data.resource_type
                })
            });

            uploaded += file.size;

            // raha vita daholo
            if (uploaded >= totalSize) {
                setTimeout(() => {
                    location.reload();
                }, 500);
            }
        };

        xhr.send(formData);
    }
});
</script>
