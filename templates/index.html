<script>
document.getElementById("uploadForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const files = document.getElementById("fileInput").files;
    let progress = document.getElementById("progress");
    let bar = document.getElementById("bar");
    let text = document.getElementById("percentText");

    if (!files.length) return;

    progress.style.display = "block";

    let uploaded = 0;
    let totalSize = 0;

    for (let f of files) totalSize += f.size;

    for (let file of files) {

        // ✅ LIMIT 100MB
        if (file.size > 100 * 1024 * 1024) {
            alert(file.name + " lehibe loatra (max 100MB)");
            continue;
        }

        let formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "unsigned_upload");

        let xhr = new XMLHttpRequest();

        xhr.open("POST", "https://api.cloudinary.com/v1_1/dr0hbtyqz/auto/upload");

        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                let percent = Math.round(((uploaded + e.loaded) / totalSize) * 100);
                bar.style.width = percent + "%";
                text.innerText = percent + "%";
            }
        };

        xhr.onload = async function() {
            if (xhr.status !== 200) {
                alert("Erreur upload");
                return;
            }

            let data = JSON.parse(xhr.responseText);

            await fetch("/save", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    nom: file.name,
                    url: data.secure_url,
                    type: data.resource_type
                })
            });

            uploaded += file.size;

            if (uploaded >= totalSize) {
                setTimeout(() => location.reload(), 500);
            }
        };

        xhr.onerror = function() {
            alert("Erreur réseau");
        };

        xhr.send(formData);
    }
});
</script>
