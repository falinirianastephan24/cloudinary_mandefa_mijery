<!DOCTYPE html>
<html>
<head>
    <title>Galerie Media</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            width: 220px;
        }

        img, video {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 5px;
            margin-top: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>📤 Ampidiro Sary na Video</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">
    
    <!-- afaka misafidy maro -->
    <input type="file" name="files" multiple required><br><br>

    <button type="submit">Alefa</button>
</form>

<h2>🖼️ / 🎥 Galerie</h2>

<div class="gallery">

    {% for m in medias %}
        <div class="card">

            <p><b>{{ m[1] }}</b></p>

            {% if m[3] == "image" %}
                <img src="{{ m[2] }}">
            {% elif m[3] == "video" %}
                <video controls>
                    <source src="{{ m[2] }}">
                </video>
            {% endif %}

            <a href="/delete/{{ m[0] }}">
                <button>Supprimer</button>
            </a>

        </div>
    {% endfor %}

</div>

</body>
</html>
