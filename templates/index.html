<!DOCTYPE html>
<html>
<head>
    <title>Upload PRO MAX</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        #progress {
            width: 100%;
            background: #1e293b;
            display: none;
        }

        #bar {
            height: 20px;
            width: 0%;
            background: green;
        }
    </style>
</head>

<body>

<h1>🚀 Upload Video Large (1GB+)</h1>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<div id="progress">
    <div id="bar"></div>
</div>
<p id="percentText">0%</p>

<script>
async function uploadFile() {

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Misafidiana fichier");

    const chunkSize = 20 * 1024 * 1024; // 20MB / chunk
    const totalChunks = Math.ceil(file.size / chunkSize);

    let uploaded = 0;

    const progress = document.getElementById("progress");
    const bar = document.getElementById("bar");
    const text = document.getElementById("percentText");

    progress.style.display = "block";

    const uploadId = Date.now(); // unique ID

    for (let i = 0; i < totalChunks; i++) {

        const start = i * chunkSize;
        const end = Math.min(start + chunkSize, file.size);

        const chunk = file.slice(start, end);

        let formData = new FormData();
        formData.append("file", chunk);
        formData.append("upload_preset", "unsigned_upload");
        formData.append("chunk_number", i + 1);
        formData.append("total_chunks", totalChunks);
        formData.append("upload_id", uploadId);

        let res = await fetch("https://api.cloudinary.com/v1_1/dr0hbtyqz/auto/upload", {
            method: "POST",
            body: formData
        });

        if (!res.ok) {
            alert("Erreur upload chunk");
            return;
        }

        uploaded += chunk.size;

        let percent = Math.round((uploaded / file.size) * 100);
        bar.style.width = percent + "%";
        text.innerText = percent + "%";

        var data = await res.json();

        // rehefa chunk farany → save DB
        if (i === totalChunks - 1) {

            await fetch("/save", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    nom: file.name,
                    url: data.secure_url,
                    type: data.resource_type
                })
            });

            alert("Upload vita 🎉");
            location.reload();
        }
    }
}
</script>

</body>
</html>
