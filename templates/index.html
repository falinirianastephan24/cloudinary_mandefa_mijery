<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
}

.header {
    padding:15px;
    text-align:center;
    background:#020617;
    font-size:20px;
}

.header a {
    color:#38bdf8;
    text-decoration:none;
    margin-left:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:15px;
}

.card {
    background:#1e293b;
    padding:10px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.03);
}

img,video {
    width:100%;
    border-radius:10px;
}

button {
    background:#38bdf8;
    border:none;
    padding:6px 12px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#0ea5e9;
}

input {
    padding:6px;
    border-radius:5px;
    border:none;
}

.comment-box {
    margin-top:5px;
}

</style>
</head>

<body>

<div class="header">
📱 Galerie Moderne
<a href="/login">Admin</a>
</div>

<div class="grid">

{% for m in medias %}
<div class="card">

<h4>{{ m[1] }}</h4>

{% if "image" in m[3] %}
<img src="{{ m[2] }}">
{% elif "video" in m[3] %}
<video src="{{ m[2] }}" controls></video>
{% else %}
<a href="{{ m[2] }}">Download</a>
{% endif %}

<p>{{ m[4] }}</p>

<!-- ❤️ like -->
<a href="/like/{{ m[0] }}">
<button>❤️ {{ likes[m[0]] }}</button>
</a>

<hr>

<!-- 💬 commentaires -->
{% for c in comments %}
{% if c[1] == m[0] %}
<p>💬 {{ c[2] }}</p>
{% endif %}
{% endfor %}

<form action="/comment" method="POST" class="comment-box">
<input type="hidden" name="media_id" value="{{ m[0] }}">
<input type="text" name="text" placeholder="Commentaire..." required>
<button>Send</button>
</form>

</div>
{% endfor %}

</div>

</body>
</html>
