<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center;font-family:Arial;">

<h2>🔐 Admin Login</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
<input name="username" placeholder="Nom"><br><br>
<input type="password" name="password" placeholder="Code"><br><br>
<button style="background:#38bdf8;padding:8px;border:none;border-radius:5px;">Login</button>
</form>

</body>
</html>
